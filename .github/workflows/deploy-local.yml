name: Deploy to Local Docker

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Fix Docker credential helper for non-interactive session
        run: |
          # Disable osxkeychain credential helper that requires GUI interaction
          export DOCKER_CONFIG="$HOME/.docker"
          mkdir -p "$DOCKER_CONFIG"
          if [ -f "$DOCKER_CONFIG/config.json" ]; then
            # Remove credsStore from existing config
            python3 -c "
import json, os
p = os.path.join(os.environ['DOCKER_CONFIG'], 'config.json')
with open(p) as f: c = json.load(f)
c.pop('credsStore', None)
c.pop('credStore', None)
with open(p, 'w') as f: json.dump(c, f)
"
          else
            echo '{}' > "$DOCKER_CONFIG/config.json"
          fi

      - name: Build and deploy containers
        run: |
          cd ${{ github.workspace }}
          docker compose down
          docker compose up --build -d

      - name: Wait for health check
        run: |
          echo "Waiting for backend to be healthy..."
          for i in $(seq 1 30); do
            if docker compose ps backend | grep -q "healthy"; then
              echo "Backend is healthy!"
              exit 0
            fi
            sleep 10
          done
          echo "Backend health check timed out, but containers are running"
          docker compose ps
