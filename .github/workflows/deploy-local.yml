name: Deploy to Local Docker

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Fix Docker credential helper for non-interactive session
        run: |
          # Remove osxkeychain credential helper that requires GUI interaction
          mkdir -p ~/.docker
          echo '{"credsStore":""}' > ~/.docker/config.json

      - name: Build and deploy containers
        run: |
          cd ${{ github.workspace }}
          docker compose down
          docker compose up --build -d

      - name: Wait for health check
        run: |
          echo "Waiting for backend to be healthy..."
          for i in $(seq 1 30); do
            if docker compose ps backend | grep -q "healthy"; then
              echo "Backend is healthy!"
              exit 0
            fi
            sleep 10
          done
          echo "Backend health check timed out, but containers are running"
          docker compose ps
