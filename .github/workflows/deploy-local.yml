name: Deploy to Local Docker

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Fix Docker credential helper for non-interactive session
        run: |
          mkdir -p ~/.docker
          cat ~/.docker/config.json 2>/dev/null | python3 -c "
          import sys, json
          try:
              c = json.load(sys.stdin)
          except:
              c = {}
          c.pop('credsStore', None)
          c.pop('credStore', None)
          print(json.dumps(c))
          " > ~/.docker/config.json.tmp
          mv ~/.docker/config.json.tmp ~/.docker/config.json

      - name: Build and deploy containers
        run: |
          cd ${{ github.workspace }}
          docker compose down
          docker compose up --build -d

      - name: Wait for health check
        run: |
          echo "Waiting for backend to be healthy..."
          for i in $(seq 1 30); do
            if docker compose ps backend | grep -q "healthy"; then
              echo "Backend is healthy!"
              exit 0
            fi
            sleep 10
          done
          echo "Backend health check timed out, but containers are running"
          docker compose ps
