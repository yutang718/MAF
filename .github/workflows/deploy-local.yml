name: Deploy to Local Docker

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Fix Docker keychain access for non-interactive session
        run: |
          security unlock-keychain -p "" ~/Library/Keychains/login.keychain-db 2>/dev/null || true
          # Fallback: ensure config exists without credsStore
          if grep -q "credsStore" ~/.docker/config.json 2>/dev/null; then
            sed -i '' 's/"credsStore"[^,}]*,\?//' ~/.docker/config.json
          fi

      - name: Build and deploy containers
        run: |
          cd ${{ github.workspace }}
          docker compose down || true
          docker compose up --build -d

      - name: Wait for health check
        run: |
          echo "Waiting for backend to be healthy..."
          for i in $(seq 1 30); do
            if docker compose ps backend | grep -q "healthy"; then
              echo "Backend is healthy!"
              exit 0
            fi
            sleep 10
          done
          echo "Backend health check timed out, but containers are running"
          docker compose ps
